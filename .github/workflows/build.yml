name: Build Flutter Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  windows:
    runs-on: windows-latest

    # MSVC on the runner (VS 18 / 14.51) makes the deprecated
    # <experimental/coroutine> header a hard error (STL1011). audioplayers_windows
    # still includes it, so silence it for every cl.exe call via the CL env var
    # (MSVC auto-prepends CL to each compiler invocation, including plugins).
    env:
      CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor

      - run: flutter config --enable-windows-desktop

      - run: flutter create --platforms=windows .

      - run: flutter pub get

      - run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter doctor

      - run: flutter config --enable-linux-desktop

      - run: flutter create --platforms=linux .

      - run: flutter pub get

      - run: flutter build linux --release

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
